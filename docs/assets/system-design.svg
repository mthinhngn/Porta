<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1120" viewBox="0 0 1500 1120" role="img" aria-labelledby="title desc">
  <title id="title">LLM Gateway system design</title>
  <desc id="desc">LLM Gateway request flow from client through auth, guardrails, quota, cache, routing, OpenAI, Ollama fallbacks, persistence, Redis, and database.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238" />
    </marker>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#eef6f1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0b1f2a" flood-opacity="0.14" />
    </filter>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #102027; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #52656f; }
      .box { fill: #ffffff; stroke: #b8c7ce; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .box-blue { fill: #e9f4ff; stroke: #6aa7d8; }
      .box-green { fill: #ebf8f0; stroke: #69b886; }
      .box-red { fill: #fff0ef; stroke: #d87468; }
      .box-yellow { fill: #fff7df; stroke: #d7aa3c; }
      .box-purple { fill: #f3efff; stroke: #9b80d7; }
      .store { fill: #f8fbfd; stroke: #7b9099; stroke-width: 2; filter: url(#shadow); }
      .label { font: 700 19px Arial, sans-serif; fill: #172a33; }
      .small { font: 400 15px Arial, sans-serif; fill: #43545c; }
      .edge { stroke: #263238; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .edge-muted { stroke: #6f7f86; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 7; }
      .edge-label { font: 700 14px Arial, sans-serif; fill: #263238; }
      .pill { fill: #102027; rx: 13; }
      .pill-text { font: 700 13px Arial, sans-serif; fill: #ffffff; letter-spacing: .4px; }
    </style>
  </defs>

  <rect width="1500" height="1120" fill="url(#bg)" />

  <text x="70" y="70" class="title">LLM Gateway System Design</text>
  <text x="70" y="102" class="subtitle">Runtime order: auth -> guardrail -> quota -> cache -> provider retry/fallback -> persist</text>

  <rect x="70" y="145" width="200" height="86" class="box box-blue" />
  <text x="170" y="180" text-anchor="middle" class="label">Client / App</text>
  <text x="170" y="205" text-anchor="middle" class="small">POST /v1/generate</text>

  <rect x="335" y="145" width="220" height="86" class="box box-blue" />
  <text x="445" y="180" text-anchor="middle" class="label">FastAPI API</text>
  <text x="445" y="205" text-anchor="middle" class="small">HTTP boundary</text>

  <rect x="620" y="145" width="220" height="86" class="box" />
  <text x="730" y="180" text-anchor="middle" class="label">Auth</text>
  <text x="730" y="205" text-anchor="middle" class="small">Bearer gateway key</text>

  <rect x="905" y="145" width="230" height="86" class="box box-yellow" />
  <text x="1020" y="180" text-anchor="middle" class="label">Guardrail</text>
  <text x="1020" y="205" text-anchor="middle" class="small">deterministic allow/block</text>

  <rect x="1190" y="95" width="230" height="86" class="box box-red" />
  <text x="1305" y="130" text-anchor="middle" class="label">Blocked</text>
  <text x="1305" y="155" text-anchor="middle" class="small">400 sanitized denial</text>

  <rect x="905" y="300" width="230" height="86" class="box box-green" />
  <text x="1020" y="335" text-anchor="middle" class="label">Redis Quota</text>
  <text x="1020" y="360" text-anchor="middle" class="small">per actor</text>

  <rect x="1190" y="300" width="230" height="86" class="box box-red" />
  <text x="1305" y="335" text-anchor="middle" class="label">Quota Denial</text>
  <text x="1305" y="360" text-anchor="middle" class="small">429 no provider usage</text>

  <rect x="620" y="300" width="220" height="96" class="box box-green" />
  <text x="730" y="335" text-anchor="middle" class="label">Redis Cache</text>
  <text x="730" y="360" text-anchor="middle" class="small">actor scoped</text>
  <text x="730" y="381" text-anchor="middle" class="small">guardrail-version scoped</text>

  <rect x="335" y="300" width="220" height="96" class="box box-green" />
  <text x="445" y="335" text-anchor="middle" class="label">Cache Hit</text>
  <text x="445" y="360" text-anchor="middle" class="small">return cached response</text>
  <text x="445" y="381" text-anchor="middle" class="small">no new charge</text>

  <rect x="620" y="470" width="220" height="96" class="box box-purple" />
  <text x="730" y="505" text-anchor="middle" class="label">Task Router</text>
  <text x="730" y="530" text-anchor="middle" class="small">coding or general</text>
  <text x="730" y="551" text-anchor="middle" class="small">no model call</text>

  <rect x="620" y="650" width="220" height="96" class="box box-blue" />
  <text x="730" y="685" text-anchor="middle" class="label">OpenAI Primary</text>
  <text x="730" y="710" text-anchor="middle" class="small">retry once if retryable</text>
  <text x="730" y="731" text-anchor="middle" class="small">shared deadline</text>

  <rect x="905" y="650" width="230" height="96" class="box box-blue" />
  <text x="1020" y="685" text-anchor="middle" class="label">OpenAI Retry</text>
  <text x="1020" y="710" text-anchor="middle" class="small">only one same-provider</text>
  <text x="1020" y="731" text-anchor="middle" class="small">retry allowed</text>

  <rect x="335" y="650" width="220" height="96" class="box box-red" />
  <text x="445" y="685" text-anchor="middle" class="label">Provider Failure</text>
  <text x="445" y="710" text-anchor="middle" class="small">sanitized error</text>
  <text x="445" y="731" text-anchor="middle" class="small">no cache / no usage</text>

  <rect x="905" y="830" width="230" height="96" class="box box-purple" />
  <text x="1020" y="865" text-anchor="middle" class="label">Ollama Qwen</text>
  <text x="1020" y="890" text-anchor="middle" class="small">qwen2.5-coder:3b</text>
  <text x="1020" y="911" text-anchor="middle" class="small">coding fallback first</text>

  <rect x="620" y="830" width="220" height="96" class="box box-purple" />
  <text x="730" y="865" text-anchor="middle" class="label">Ollama Llama</text>
  <text x="730" y="890" text-anchor="middle" class="small">llama3.2:3b</text>
  <text x="730" y="911" text-anchor="middle" class="small">general fallback first</text>

  <rect x="1190" y="650" width="230" height="106" class="box box-green" />
  <text x="1305" y="685" text-anchor="middle" class="label">SQL Ledger</text>
  <text x="1305" y="710" text-anchor="middle" class="small">requests + attempts</text>
  <text x="1305" y="731" text-anchor="middle" class="small">exactly one usage row</text>

  <rect x="1190" y="850" width="230" height="86" class="box box-green" />
  <text x="1305" y="885" text-anchor="middle" class="label">Cache Write</text>
  <text x="1305" y="910" text-anchor="middle" class="small">successful responses only</text>

  <rect x="1190" y="995" width="230" height="70" class="box box-blue" />
  <text x="1305" y="1030" text-anchor="middle" class="label">GenerateResponse</text>
  <text x="1305" y="1053" text-anchor="middle" class="small">provider, usage, cost</text>

  <path d="M270 188 H335" class="edge" />
  <path d="M555 188 H620" class="edge" />
  <path d="M840 188 H905" class="edge" />
  <path d="M1135 165 C1160 150 1165 138 1190 138" class="edge" />
  <text x="1152" y="139" class="edge-label">block</text>

  <path d="M1020 231 V300" class="edge" />
  <text x="1032" y="268" class="edge-label">allow</text>

  <path d="M1135 343 H1190" class="edge" />
  <text x="1148" y="333" class="edge-label">limit</text>

  <path d="M905 343 H840" class="edge" />
  <text x="855" y="333" class="edge-label">ok</text>

  <path d="M620 348 H555" class="edge" />
  <text x="574" y="338" class="edge-label">hit</text>

  <path d="M730 396 V470" class="edge" />
  <text x="742" y="436" class="edge-label">miss</text>

  <path d="M730 566 V650" class="edge" />
  <path d="M840 698 H905" class="edge" />
  <text x="855" y="688" class="edge-label">retryable</text>

  <path d="M620 698 H555" class="edge" />
  <text x="566" y="688" class="edge-label">non-retryable</text>

  <path d="M1020 746 V830" class="edge" />
  <text x="1032" y="792" class="edge-label">coding</text>

  <path d="M960 746 C900 790 805 795 760 830" class="edge" />
  <text x="844" y="792" class="edge-label">general</text>

  <path d="M905 878 H840" class="edge-muted" />
  <text x="856" y="868" class="edge-label">alternate</text>

  <path d="M840 878 H905" class="edge-muted" />
  <text x="852" y="912" class="edge-label">alternate</text>

  <path d="M840 685 C980 625 1070 625 1190 685" class="edge" />
  <text x="1000" y="625" class="edge-label">success</text>

  <path d="M1135 685 H1190" class="edge" />
  <text x="1144" y="675" class="edge-label">success</text>

  <path d="M1135 878 C1180 820 1215 780 1260 756" class="edge" />
  <path d="M840 878 C1030 835 1140 790 1240 756" class="edge" />

  <path d="M1305 756 V850" class="edge" />
  <path d="M1305 936 V995" class="edge" />

  <rect x="70" y="860" width="420" height="126" class="store" rx="22" />
  <text x="280" y="900" text-anchor="middle" class="label">Storage and Privacy Invariants</text>
  <text x="280" y="928" text-anchor="middle" class="small">Redis stores scoped encrypted cache data</text>
  <text x="280" y="950" text-anchor="middle" class="small">Database stores sanitized operational records</text>
  <text x="280" y="972" text-anchor="middle" class="small">Prompts, outputs, API keys, and secrets are not persisted</text>

  <rect x="70" y="1015" width="705" height="48" class="pill" />
  <text x="422" y="1046" text-anchor="middle" class="pill-text">GUARDRAILS DO NOT CALL MODELS; FALLBACK MODEL ORDER IS BASED ON DETERMINISTIC TASK CLASSIFICATION</text>
</svg>
